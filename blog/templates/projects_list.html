{% extends "base.html" %}
{% block title %}Projects — {{ site_name }}{% endblock %}

{% block content %}
<h1>Projects</h1>
<ul>
  {% for p in projects %}
  <li><a href="{{ p.get_absolute_url }}">{{ p.title }}</a>{% if p.description %} — {{ p.description|truncatewords:20 }}{% endif %}</li>
  {% endfor %}
</ul>
{% endblock %}
